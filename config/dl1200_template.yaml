# DataLink 1200 form geometry template (provisional bootstrap)
# Exact bubble center geometry is bootstrap-only and must not override anchor-derived placement.
# Values are normalized coordinates (0.0 to 1.0) relative to registered image.
# Bubble position fields are provisional - refine from debug overlay.
template_version: 2

form:
  name: "Apperson DataLink 1200"
  model: "28040"
  orientation: portrait

timing_marks:
  left_edge:
    x: 0.018
    start_y: 0.067
    end_y: 0.91
    expected_count: 60
  top_edge:
    y: 0.035
    start_x: 0.04
    end_x: 0.96
    expected_count: 53

answers:
  num_questions: 100
  choices:
    - A
    - B
    - C
    - D
    - E
  bubble_radius: 0.007
  bubble_shape:
    aspect_ratio: 5.4545

  left_column:
    question_range: [1, 50]
    first_question_y: 0.2111
    question_spacing_y: 0.01418
    # integer column indices in the 53-column top timing mark grid
    choice_columns:
      A: 5
      B: 8
      C: 10
      D: 13
      E: 16

  right_column:
    question_range: [51, 100]
    first_question_y: 0.2111
    question_spacing_y: 0.01418
    # integer column indices in the 53-column top timing mark grid
    choice_columns:
      A: 24
      B: 27
      C: 30
      D: 33
      E: 36

student_id:
  num_digits: 9
  grid:
    # provisional - refine from overlay
    first_digit_x: 0.090
    digit_spacing_x: 0.033
    first_value_y: 0.080
    value_spacing_y: 0.013
